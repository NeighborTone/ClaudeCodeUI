title: "Setup Statusline (Subscription Usage)"
content: |
  # Claude Code ステータスライン設定（サブスクリプション用）

  Claude Codeのステータスラインに以下3行を表示するスクリプトを設定してください。

  ---

  ## 表示仕様

  ### 3行構成

  ```
  [Opus] │ 42%                          ← モデル名 | コンテキスト使用率
  [5h] ▰▱▱▱▱▱▱▱▱▱ 10% reset: 23:00 (3h 22m)  ← 5h使用率 + リセット時刻 (残り時間)
  [7d] ▰▰▰▰▰▱▱▱▱▱ 53% reset: 03/13 19:00 (2d 23h)  ← 7d使用率 + リセット日時 (残り時間)
  ```

  | 行 | 内容 |
  |----|------|
  | Line 1 | モデル名（Opus/Sonnet/Haiku） `│` コンテキスト使用率% `+add/-del branch`（gitリポジトリ時） |
  | Line 2 | 5時間レートリミット: プログレスバー + 使用率% + リセット時刻(HH:MM) + 残り時間 |
  | Line 3 | 7日間レートリミット: プログレスバー + 使用率% + リセット日時(MM/DD HH:MM) + 残り時間 |

  ### カラーリング（24bit ANSI）

  | 使用率 | 色 | RGB |
  |--------|-----|-----|
  | 0-49% | グリーン | #97C9C3 |
  | 50-79% | イエロー | #E5C07B |
  | 80-100% | レッド | #E06C75 |
  | 区切り・ラベル | グレー | #4A585C |

  ### プログレスバー

  - 10セグメント（`▰` = 使用済み、`▱` = 残り）
  - 例: 38% → `▰▰▰▰▱▱▱▱▱▱`

  ### リセット残り時間フォーマット

  | 条件 | 表示形式 | 例 |
  |------|----------|-----|
  | 1日以上 | `Xd Xh` | `2d 23h` |
  | 1時間以上 | `Xh Xm` | `3h 22m` |
  | 1時間未満 | `Xm` | `45m` |
  | リセット済み | `now` | `now` |

  ---

  ## 実装手順

  ### Step 1: スクリプト作成

  #### スクリプト言語

  | OS | スクリプト言語 | ファイル名 | 備考 |
  |----|---------------|-----------|------|
  | **Windows** | Bash (Git Bash) | `~/.claude/statusline.sh` | Claude CodeがGit Bash経由で実行する。jq必須 |
  | **macOS/Linux** | Bash | `~/.claude/statusline.sh` | jq必須 |

  **【重要】Windows環境でもBashスクリプトを使用する。** Claude CodeはWindows上でもGit Bash経由でstatusLineコマンドを実行するため、Bashスクリプトが動作する。PowerShellは不要。

  #### jqのインストール（Windows）

  Windowsにjqが入っていない場合、`~/bin/` にダウンロードしてスクリプト冒頭で `export PATH="$HOME/bin:$PATH"` する:

  ```bash
  mkdir -p ~/bin
  curl -sL -o ~/bin/jq.exe "https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-windows-amd64.exe"
  chmod +x ~/bin/jq.exe
  ```

  #### 入力（stdin）

  Claude Codeが自動的にJSON形式でステータス情報を渡す:

  ```json
  {
    "model": { "display_name": "Claude Opus 4.6" },
    "context_window": { "used_percentage": 23.5 },
    "cwd": "/path/to/project"
  }
  ```

  #### OAuthトークン取得

  **認証情報ファイル**: `~/.claude/.credentials.json`

  ```json
  {
    "claudeAiOauth": {
      "accessToken": "sk-ant-oat01-...",
      "refreshToken": "...",
      "subscriptionType": "max"
    }
  }
  ```

  トークンの読み取り方法（全OS共通）:

  ```bash
  jq -r '.claudeAiOauth.accessToken // empty' "$HOME/.claude/.credentials.json"
  ```

  **【重要】Windows Credential Manager（cmdkey/CredRead）には認証情報は保存されていない。** ファイルから直接読み取ること。

  macOSではキーチェーンにも保存される場合がある（`security find-generic-password -s "Claude Code-credentials" -w`）が、`.credentials.json` ファイルが存在すればそちらを優先する。

  #### OAuthトークン自動リフレッシュ

  アクセストークンは数時間で期限切れになる。期限切れの度に `/login` を手動実行するのは不便なため、スクリプト内で自動リフレッシュを行う。

  **認証情報ファイルの `expiresAt` フィールド**:

  - Unix epoch ミリ秒（例: `1773178632843`）
  - 期限切れ判定: `現在時刻(ms) + 300000(5分バッファ) >= expiresAt` なら期限切れ

  **リフレッシュAPIエンドポイント**:

  ```
  POST https://platform.claude.com/v1/oauth/token
  Content-Type: application/json
  ```

  **リクエストボディ**:

  ```json
  {
    "grant_type": "refresh_token",
    "refresh_token": "<credentials.jsonのrefreshToken>",
    "client_id": "9d1c250a-e61b-44d9-88ed-5944d1962f5e",
    "scope": "user:profile user:inference user:sessions:claude_code user:mcp_servers"
  }
  ```

  **環境変数オーバーライド**:

  | 環境変数 | 説明 | デフォルト値 |
  |----------|------|-------------|
  | `CLAUDE_CODE_OAUTH_CLIENT_ID` | クライアントID | `9d1c250a-e61b-44d9-88ed-5944d1962f5e` |
  | `CLAUDE_CODE_CUSTOM_OAUTH_URL` | ベースURL | `https://platform.claude.com` |

  **レスポンス**:

  ```json
  {
    "access_token": "sk-ant-oat01-...",
    "refresh_token": "sk-ant-...",
    "expires_in": 28800,
    "scope": "user:profile user:inference user:sessions:claude_code user:mcp_servers"
  }
  ```

  - `refresh_token` が未返却の場合は既存のリフレッシュトークンを維持
  - `expires_in` は秒単位。新しい `expiresAt` = `現在時刻(ms) + expires_in * 1000`

  **リフレッシュ後の処理**:

  1. `~/.claude/.credentials.json` を更新（`accessToken`, `refreshToken`, `expiresAt`）
  2. 更新にはtmpファイル + mvを使用（アトミック書き込み）
  3. リフレッシュ失敗時は既存トークンでフォールバック（エラーにはしない）

  **【重要】リフレッシュに失敗しても表示は止めない。** 既存トークンでAPI呼び出しを試行し、それも失敗した場合のみ「token unavailable」を表示する。

  #### Usage API呼び出し

  ```
  GET https://api.anthropic.com/api/oauth/usage
  ```

  **必須ヘッダー**:

  | ヘッダー | 値 |
  |----------|-----|
  | `Authorization` | `Bearer <accessToken>` |
  | `anthropic-beta` | `oauth-2025-04-20` |

  **【重要】`anthropic-beta: oauth-2025-04-20` ヘッダーがないとAPIが応答しない。**

  #### APIレスポンス形式

  ```json
  {
    "five_hour": {
      "utilization": 10.0,
      "resets_at": "2026-03-10T14:00:01.021457+00:00"
    },
    "seven_day": {
      "utilization": 53.0,
      "resets_at": "2026-03-13T10:00:01.021476+00:00"
    },
    "seven_day_oauth_apps": null,
    "seven_day_opus": null,
    "seven_day_sonnet": {
      "utilization": 2.0,
      "resets_at": "2026-03-14T09:00:01.021484+00:00"
    },
    "seven_day_cowork": null,
    "extra_usage": {
      "is_enabled": true,
      "monthly_limit": 5000,
      "used_credits": 0.0,
      "utilization": null
    }
  }
  ```

  - `utilization`: **0〜100のパーセント値**（0.0〜1.0ではない。37.0 = 37%）
  - `resets_at`: ISO 8601形式のタイムスタンプ（タイムゾーン付き）
  - `five_hour` / `seven_day` を使用する

  #### キャッシュ

  - **Windows**: `$TEMP/claude_usage_cache.json`（TEMP環境変数）
  - **macOS/Linux**: `/tmp/claude_usage_cache.json`
  - キャッシュTTL: **60秒**
  - ステータスラインは頻繁に呼ばれるため、毎回APIを叩かないようにする

  ```
  処理フロー:
  1. トークン取得:
     a. credentials.json の expiresAt を確認
     b. 期限切れ（5分バッファ含む）→ refreshToken でトークンリフレッシュ
        - 成功 → credentials.json を更新し、新トークンを使用
        - 失敗 → 既存トークンでフォールバック
     c. 有効期限内 → そのまま accessToken を使用
  2. キャッシュファイルが存在し、60秒以内 → キャッシュを返す
  3. キャッシュが古い or 存在しない → Usage API呼び出し（タイムアウト5秒）
     - 成功 → キャッシュに保存して返す
     - 失敗 → 空を返す（token unavailable表示）
  4. トークン取得失敗（refreshも失敗）→ 「token unavailable - run: claude /login」表示
  ```

  ### Step 2: settings.json更新

  ユーザーの `~/.claude/settings.json` に `statusLine` 設定を追加（既存設定はマージ）。

  **全OS共通**:

  ```json
  {
    "statusLine": {
      "type": "command",
      "command": "~/.claude/statusline.sh"
    }
  }
  ```

  ---

  ## Bash実装時の注意点

  | 項目 | 正しい方法 | 間違い（動かない） |
  |------|-----------|-------------------|
  | ANSI色変数定義 | `GREEN=$'\033[38;2;151;201;195m'` | `GREEN="\033[38;2;151;201;195m"` |
  | 色の出力 | `printf '%s' "$GREEN"` | `echo -n "$GREEN"` |
  | 色付き文字列の組み立て | 変数を直接結合: `"${GREEN}text${RESET}"` | printfの`%s`引数に渡す |
  | printfでの色出力 | `printf '%s' "${color}text${RESET}"` | `printf "${color}%s" "text"` ※format内は動くが混在すると不整合 |
  | jq (Windows) | `~/bin/` にダウンロード + PATH追加 | PowerShellの `ConvertFrom-Json` を使う |
  | トークン取得 | `~/.claude/.credentials.json` から jq で読む | Windows Credential Manager から読む |

  **【最重要】`$'\033[...'` と `"\033[..."` の違い:**

  - `$'\033[38;2;151;201;195m'` → シェルが代入時にエスケープを解釈し、**実際のESC文字**が変数に入る
  - `"\033[38;2;151;201;195m"` → `\033` が**リテラル文字列**として変数に入る → ターミナルに `\033[38;2;...` と生表示される

  ---

  ## 実行手順

  1. まず `~/.claude/settings.json` を読み取り、既存設定を確認する
  2. jqがインストールされているか確認する（無ければ `~/bin/` にダウンロード）
  3. `~/.claude/statusline.sh` を作成する（上記仕様に従い、`$'...'` 構文でANSI色を定義）
  4. `chmod +x ~/.claude/statusline.sh` で実行権限を付与する
  5. `settings.json` に `statusLine` 設定を追加（既存設定とマージ）
  6. モックデータでテストする: `echo '{"model":{"display_name":"Opus"},"context_window":{"used_percentage":25},"cwd":"/tmp"}' | ~/.claude/statusline.sh`
  7. ユーザーにClaude Codeの再起動を案内する
