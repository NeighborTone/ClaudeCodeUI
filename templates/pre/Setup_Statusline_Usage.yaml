title: "Setup Statusline (Subscription Usage)"
content: |
  # Claude Code ステータスライン設定（サブスクリプション用）

  Claude Codeのステータスラインに以下3行を表示するスクリプトを設定してください。

  ---

  ## 表示仕様

  ### 3行構成

  ```
  [Opus] | 23%
  [5h] ▰▰▰▰▱▱▱▱▱▱ 38% reset 0h 8m
  [7d] ▰▰▰▰▰▰▱▱▱▱ 57% reset 1d 14h
  ```

  | 行 | 内容 |
  |----|------|
  | Line 1 | モデル名（Opus/Sonnet/Haiku） `|` コンテキスト使用率% |
  | Line 2 | 5時間レートリミット使用率 + プログレスバー + リセットまでの残り時間 |
  | Line 3 | 7日間レートリミット使用率 + プログレスバー + リセットまでの残り時間 |

  ### カラーリング（24bit ANSI）

  | 使用率 | 色 | RGB |
  |--------|-----|-----|
  | 0-49% | グリーン | #97C9C3 |
  | 50-79% | イエロー | #E5C07B |
  | 80-100% | レッド | #E06C75 |
  | 区切り・ラベル | グレー | #4A585C |

  ### プログレスバー

  - 10セグメント（▰ = 使用済み、▱ = 残り）
  - 例: 38% → `▰▰▰▰▱▱▱▱▱▱`

  ### リセット残り時間フォーマット

  | 条件 | 表示形式 | 例 |
  |------|----------|-----|
  | 1日以上 | `Xd Xh` | `1d 14h` |
  | 1時間以上 | `Xh Xm` | `2h 30m` |
  | 1時間未満 | `Xm` | `45m` |
  | リセット済み | `now` | `now` |

  ---

  ## 実装手順

  ### Step 1: スクリプト作成

  以下の仕様でステータスラインスクリプトを作成する。

  #### OS判定と言語選択

  | OS | スクリプト言語 | ファイル名 | 理由 |
  |----|---------------|-----------|------|
  | **Windows** | PowerShell | `~/.claude/statusline.ps1` | jq不要、JSON/API/ANSIがネイティブ対応 |
  | **macOS/Linux** | Bash | `~/.claude/statusline.sh` | jq必須、事前にインストール確認すること |

  #### 入力（stdin）

  Claude Codeが自動的にJSON形式でステータス情報を渡す:

  ```json
  {
    "model": { "display_name": "Claude Opus 4.6" },
    "context_window": { "used_percentage": 23.5 },
    "cwd": "/path/to/project"
  }
  ```

  #### OAuthトークン取得

  **認証情報ファイルの場所**: `~/.claude/.credentials.json`

  ```json
  {
    "claudeAiOauth": {
      "accessToken": "sk-ant-oat01-...",
      "refreshToken": "...",
      "subscriptionType": "max"
    }
  }
  ```

  トークンの読み取り方法:
  - **Windows (PowerShell)**: `(Get-Content ~/.claude/.credentials.json | ConvertFrom-Json).claudeAiOauth.accessToken`
  - **macOS/Linux (Bash)**: macOSキーチェーンから取得、またはファイルがあればファイルから取得

  #### Usage API呼び出し

  ```
  GET https://api.anthropic.com/api/oauth/usage
  ```

  **必須ヘッダー**:

  | ヘッダー | 値 |
  |----------|-----|
  | `Authorization` | `Bearer <accessToken>` |
  | `anthropic-beta` | `oauth-2025-04-20` |
  | `Content-Type` | `application/json` |

  **【重要】`anthropic-beta: oauth-2025-04-20` ヘッダーがないと `401 Unauthorized` になる。**

  #### APIレスポンス形式

  ```json
  {
    "five_hour": {
      "utilization": 38.0,
      "resets_at": "2026-03-04T14:00:00.765393+00:00"
    },
    "seven_day": {
      "utilization": 57.0,
      "resets_at": "2026-03-06T03:59:59.765423+00:00"
    }
  }
  ```

  - `utilization`: 0〜100のパーセント値（0.0〜1.0ではない）
  - `resets_at`: ISO 8601形式のUTCタイムスタンプ

  #### キャッシュ

  API負荷軽減のため、レスポンスを180秒間（3分）キャッシュする:
  - **Windows**: `$env:TEMP\claude_usage_cache.json`
  - **macOS/Linux**: `/tmp/claude_usage_cache.json`
  - usage値は5h/7dスケールで変動が緩やかなため、3分間隔で十分な精度を確保できる

  #### 信頼性戦略（重要）

  「token unavailable」を初回以降は絶対に表示させないための多層防御:

  | 層 | 対策 | 詳細 |
  |----|------|------|
  | 1 | キャッシュTTL延長 | 180秒（API呼び出し頻度を下げ、失敗機会を削減） |
  | 2 | タイムアウト延長 | 10秒（PowerShellコールドスタートを考慮） |
  | 3 | リトライ | API失敗時に2秒後に1回リトライ |
  | 4 | フォールバックキャッシュ | リトライも失敗時は期限切れキャッシュを返す |

  ```
  処理フロー:
  1. キャッシュが存在する → まずキャッシュデータを読み込んで保持
  2. キャッシュが180秒以内 → キャッシュデータを返す（API呼び出しスキップ）
  3. キャッシュが180秒超 → API呼び出しを試行（タイムアウト10秒）
     - 成功 → 新データをキャッシュに保存して返す
     - 失敗 → 2秒後にリトライ
       - 成功 → 新データをキャッシュに保存して返す
       - 失敗 → 古いキャッシュデータをフォールバックとして返す
  4. トークン取得失敗時も、キャッシュがあればキャッシュを返す
  5. キャッシュもトークンも無い場合のみ「token unavailable」を表示
  ```

  **禁止**: API失敗時にキャッシュを破棄して `null` を返すこと（"token unavailable" が頻発する原因になる）

  ### Step 2: settings.json更新

  ユーザーの `~/.claude/settings.json` に `statusLine` 設定を追加（既存設定はマージ）。

  #### Windows

  ```json
  {
    "statusLine": {
      "type": "command",
      "command": "powershell.exe -NoProfile -ExecutionPolicy Bypass -File C:/Users/<USERNAME>/.claude/statusline.ps1"
    }
  }
  ```

  #### macOS/Linux

  ```json
  {
    "statusLine": {
      "type": "command",
      "command": "bash ~/.claude/statusline.sh"
    }
  }
  ```

  **注意**: `<USERNAME>` はユーザーの実際のユーザー名に置き換える。PowerShellの `$env:USERNAME` または bashの `whoami` で取得する。

  ---

  ## Windows実装時の注意点

  | 項目 | 注意事項 |
  |------|---------|
  | ANSI色 | `[char]0x1b` でエスケープ文字を生成する。`\033`はリテラル出力される |
  | JSON解析 | `ConvertFrom-Json` を使用（jqは不要、Windows環境にはjqが入っていないことが多い） |
  | API呼び出し | `Invoke-RestMethod` を使用（curlの代替） |
  | stdin読み取り | `[Console]::In.ReadToEnd()` を使用 |
  | パス区切り | PowerShell内では `/` でも `\` でも動作する |

  ## macOS/Linux実装時の注意点

  | 項目 | 注意事項 |
  |------|---------|
  | ANSI色 | `$'\e[38;2;R;G;Bm'` 構文で変数定義する（`"\033[..."` はprintfでは動くがechoでは不可） |
  | jq | 必須。未インストールの場合はユーザーに `brew install jq` / `apt install jq` を案内 |
  | キーチェーン | macOSの場合 `security find-generic-password -s "Claude Code-credentials" -w` でトークン取得 |

  ---

  ## 実行手順

  1. まず `~/.claude/settings.json` を読み取り、既存設定を確認する
  2. OSを判定する（Windows / macOS / Linux）
  3. 対応するスクリプトを作成する
  4. `settings.json` に `statusLine` 設定を追加（既存設定とマージ）
  5. ユーザーにClaude Codeの再起動を案内する
